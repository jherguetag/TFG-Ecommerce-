<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Tienda Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
	    <div class="container">
	        <a class="navbar-brand fw-bold" href="/">🛒 ECOMMERCE WEB</a>
	        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuTienda">
	            <span class="navbar-toggler-icon"></span>
	        </button>
	        
	        <div class="collapse navbar-collapse" id="menuTienda">
	            <ul class="navbar-nav me-auto">
	                <li class="nav-item"><a class="nav-link active" href="/">Catálogo</a></li>
	                <li class="nav-item"><a class="nav-link" href="/admin">Panel Admin</a></li>
	            </ul>
	            <a href="/login" class="btn btn-outline-light btn-sm">Iniciar Sesión</a>
	        </div>
	    </div>
	</nav>
	
	<div class="bg-white border-bottom mb-4 py-2 shadow-sm">
	    <div class="container d-flex gap-3 overflow-auto">
	        <button class="btn btn-sm btn-dark rounded-pill px-3">Todo</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3">Electrónica</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3">Hogar</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3">Moda</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3">Ofertas 🔥</button>
	    </div>
	</div>

    <div class="container">
        <h2 class="text-center mb-4">Nuestros Productos</h2>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="producto : ${productos}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${producto.imagen}" class="card-img-top" alt="Imagen del producto" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${producto.nombre}">Nombre Producto</h5>
                        <p class="card-text text-muted" th:text="${producto.descripcion}">Descripción breve...</p>
                        <h4 class="mt-auto text-primary" th:text="${producto.precio} + ' €'">0.00 €</h4>
                        <a th:href="@{/checkout/{id}(id=${producto.id})}" class="btn btn-success mt-3">Comprar ahora</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(productos)}" class="alert alert-warning text-center">
            Aún no hay productos en la tienda.
        </div>

    </div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>>
