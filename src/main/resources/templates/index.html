<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>NovaTech - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
	    <div class="container">
	        <a class="navbar-brand fw-bold fs-4 text-white" href="/">NOVATECH</a>
	        
	        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuTienda">
	            <span class="navbar-toggler-icon"></span>
	        </button>
	        
	        <div class="collapse navbar-collapse" id="menuTienda">
	            <form action="/buscar" method="get" class="d-flex mx-auto w-50">
	                <input class="form-control rounded-start border-0" type="search" name="palabra" placeholder="Buscar productos..." required>
	                <button class="btn btn-primary rounded-end" type="submit">Buscar</button>
	            </form>

	            <div class="d-flex align-items-center ms-auto gap-3">
	                
	                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
	                    <a href="/login" class="btn btn-outline-light btn-sm fw-bold">Entrar</a>
	                    <a href="/registro" class="btn btn-primary btn-sm fw-bold">Registrarse</a>
	                </div>

	                <a sec:authorize="isAuthenticated()" href="/pedidos" class="text-white text-decoration-none fw-bold">
	                    Mis Pedidos
	                </a>
	                
	                <a sec:authorize="isAuthenticated()" href="/carrito" class="btn btn-warning btn-sm fw-bold d-flex align-items-center text-dark">
	                    🛒 Cesta
	                </a>
	                
	                <a sec:authorize="isAuthenticated()" href="/logout" class="btn btn-outline-danger btn-sm">Salir</a>
	            </div>
	        </div>
	    </div>
	</nav>
	
	<div class="bg-white border-bottom mb-4 py-2 shadow-sm">
	    <div class="container d-flex gap-3 overflow-auto">
	        <button class="btn btn-sm btn-dark rounded-pill px-3 btn-filtro" onclick="filtrar('Todo', this)">Todo</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 btn-filtro" onclick="filtrar('1', this)">Informática</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 btn-filtro" onclick="filtrar('2', this)">Smartphones</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 btn-filtro" onclick="filtrar('3', this)">Smart Home</button>
	        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 btn-filtro" onclick="filtrar('4', this)">Wearables</button>
	    </div>
	</div>

    <div class="container">
        <h2 class="text-center mb-4">Nuestros Productos</h2>

        <div class="row">
            <div class="col-md-4 mb-4 tarjeta-producto" th:data-categoria="${producto.categoria != null ? producto.categoria.id : '0'}" th:each="producto : ${productos}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${producto.imagen}" class="card-img-top p-3 bg-white" alt="Imagen del producto" style="height: 200px; object-fit: contain;">
                    <div class="card-body d-flex flex-column">
						<h5 class="card-title" th:text="${producto.nombre}">Nombre Producto</h5>
						<p class="card-text text-muted" th:text="${producto.descripcion}">Descripción breve...</p>

						<p class="text-warning mb-1 fw-bold">
						    ★ <span th:text="${producto.valoracion != null ? producto.valoracion : '5.0'}">5.0</span> / 5
						</p>

						<h4 class="mt-auto text-primary" th:text="${producto.precio} + ' €'">0.00 €</h4>
                        
						<button sec:authorize="isAnonymous()" onclick="pedirLogin()" class="btn btn-success w-100 mt-2">
						    Añadir a la Cesta
						</button>

						<button sec:authorize="isAuthenticated()" th:onclick="'alternarCarrito(' + ${producto.id} + ', this)'" class="btn btn-success w-100 mt-2">
						    Añadir a la Cesta
						</button>

                        <div class="mt-3 border-top pt-2 text-start">
                            <h6 class="fw-bold small text-secondary">💬 Opiniones:</h6>
                            <div class="overflow-auto mb-2" style="max-height: 100px;">
                                <div th:each="resena : ${producto.resenas}" class="mb-1 p-2 bg-light rounded border shadow-sm">
                                    <strong class="small text-primary" th:text="${resena.usuario.email}">Usuario</strong><br>
                                    <span class="small text-muted" th:text="${resena.comentario}">Comentario</span>
                                </div>
                                <div th:if="${#lists.isEmpty(producto.resenas)}" class="small text-muted fst-italic">
                                    No hay opiniones todavía. ¡Sé el primero!
                                </div>
                            </div>
                        </div>

                        <form sec:authorize="isAuthenticated()" th:action="@{/resena/add/{id}(id=${producto.id})}" method="post" class="mt-2 border-top pt-2">
                            <input type="text" name="comentario" class="form-control form-control-sm mb-1" placeholder="Deja tu reseña..." required>
                            <button type="submit" class="btn btn-outline-primary btn-sm w-100">Publicar Reseña</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(productos)}" class="alert alert-warning text-center">
            Aún no hay productos en la tienda.
        </div>

    </div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	    
    <script th:if="${accesoDenegado}">
        Swal.fire({
            icon: 'error',
            title: 'Acceso Restringido',
            text: '[[${accesoDenegado}]]',
            confirmButtonColor: '#d33',
            confirmButtonText: 'Entendido'
        });
    </script>
	
	<script>
	    function filtrar(categoria) {
	        let tarjetas = document.querySelectorAll('.tarjeta-producto');
	        
	        tarjetas.forEach(tarjeta => {
	            // Si elegimos "Todo" o si la tarjeta coincide con la categoría, la mostramos
	            if (categoria === 'Todo' || tarjeta.getAttribute('data-categoria') === categoria) {
	                tarjeta.style.display = 'block';
	            } else {
	                // Si no, la ocultamos
	                tarjeta.style.display = 'none';
	            }
	        });
	    }
	</script>
	
	
	<script>
	    // Función 1: Alerta para invitados
	    function pedirLogin() {
	        Swal.fire({
	            icon: 'warning',
	            title: 'Acceso exclusivo',
	            text: 'Necesitas iniciar sesión para añadir productos a la cesta.',
	            showCancelButton: true,
	            confirmButtonText: 'Ir a Entrar',
	            cancelButtonText: 'Seguir mirando',
	            confirmButtonColor: '#0d6efd'
	        }).then((result) => {
	            if (result.isConfirmed) {
	                window.location.href = '/login';
	            }
	        });
	    }

	    // Función 2: Añadir o Deshacer para clientes
	    function alternarCarrito(idProducto, boton) {
	        let estaAnadido = boton.classList.contains('btn-secondary');

	        if (!estaAnadido) {
	            // Añade al carrito
	            fetch('/carrito/add/' + idProducto, { method: 'POST' })
	            .then(response => {
	                if(response.ok) {
	                    boton.innerText = '✅ Añadido (Deshacer)';
	                    boton.classList.replace('btn-success', 'btn-secondary');
	                }
	            });
	        } else {
	            // Quita del carrito
	            fetch('/carrito/remove-producto/' + idProducto, { method: 'POST' })
	            .then(response => {
	                if(response.ok) {
	                    boton.innerText = 'Añadir a la Cesta';
	                    boton.classList.replace('btn-secondary', 'btn-success');
	                }
	            });
	        }
	    }
	</script>
</body>
</html>
