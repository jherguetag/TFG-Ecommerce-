<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Añadir Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-save { background: #10ac84; border: none; font-weight: bold; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h3 class="text-center mb-4 fw-bold" style="color: #2a5298;" th:text="${producto.id == null ? 'Crear Producto' : 'Editar Producto'}">Crear Producto</h3>
            <form th:action="@{/admin/guardar}" th:object="${producto}" method="post">
				<input type="hidden" name="id" th:value="${producto.id}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Portátil MSI" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Descripción Corta</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="2" placeholder="Características principales..."></textarea>
                </div>
                
				<div class="row">
				     <div class="col-md-6 mb-3">
				          <label class="form-label fw-bold">Precio (€)</label>
				          <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
				  	</div>
				 <div class="col-md-6 mb-3">
				           <label class="form-label fw-bold">Categoría</label>
				             <select name="categoria.id" class="form-select border-secondary" required>
				                  <option value="1" th:selected="${producto.categoria != null && producto.categoria.id == 1}">Informática</option>
				                  <option value="2" th:selected="${producto.categoria != null && producto.categoria.id == 2}">Smartphones</option>
				                  <option value="3" th:selected="${producto.categoria != null && producto.categoria.id == 3}">Smart Home</option>
				                  <option value="4" th:selected="${producto.categoria != null && producto.categoria.id == 4}">Wearables</option>
				             </select>
				    </div>
				</div>
                
                <div class="row">
                    <div class="col-md-8 mb-4">
                        <label class="form-label fw-bold">URL de la Imagen</label>
                        <input type="text" th:field="*{imagen}" class="form-control" placeholder="https://enlace-foto.jpg">
                    </div>
                    <div class="col-md-4 mb-4">
                        <label class="form-label fw-bold">Valoración (★)</label>
                        <input type="number" step="0.1" min="1" max="5" th:field="*{valoracion}" class="form-control" placeholder="Ej: 4.5">
                    </div>
                </div>
				
				<div class="mb-3">
				          <label class="form-label text-primary fw-bold">Stock Disponible</label>
				           <input type="number" th:field="*{stock}" class="form-control border-primary" placeholder="Ej: 50" min="0" required>
				      </div>

				<button type="submit" class="btn btn-success btn-lg w-100" 
				        th:text="${producto.id == null ? 'Registrar en Base de Datos' : 'Guardar Cambios'}">
				</button>
                <div class="text-center mt-3">
                    <a href="/admin" class="text-muted text-decoration-none">Cancelar y salir</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
