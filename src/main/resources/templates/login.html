<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NovaTech - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .login-container { max-width: 420px; margin: auto; margin-top: 50px; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body class="py-5">
    <div class="container login-container">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold">NOVATECH</h2>
            <p class="text-muted">Accede a tu cuenta o regístrate</p>
        </div>

        <!-- Mensajes de aviso de Spring Security -->
        <div th:if="${param.error}" class="alert alert-danger text-center small shadow-sm">
            Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center small shadow-sm">
            Has cerrado sesión correctamente.
        </div>
        <div th:if="${param.registrado}" class="alert alert-primary text-center small shadow-sm">
            ¡Cuenta creada con éxito! Ahora puedes iniciar sesión.
        </div>

        <div class="card p-4 mb-4 shadow-sm">
            
            <h5 class="fw-bold mb-3 text-center text-dark">Iniciar Sesión</h5>
            
            <!-- FORMULARIO 1: LOGIN -->
            <form th:action="@{/loguear}" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <input type="password" name="pass" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 shadow-sm">Entrar</button>
            </form>

            <hr class="my-4">

            <h5 class="fw-bold mb-3 text-center text-secondary">¿No tienes cuenta?</h5>
            
            <!-- FORMULARIO 2: REGISTRO -->
            <form th:action="@{/registrar}" method="post">
                <div class="mb-2">
                    <input type="email" name="email" class="form-control form-control-sm" placeholder="Nuevo correo" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="pass" class="form-control form-control-sm" placeholder="Nueva contraseña" required>
                </div>
                <button type="submit" class="btn btn-success w-100 shadow-sm">Crear Cuenta</button>
            </form>

        </div>

        <div class="text-center">
            <a href="/" class="text-decoration-none text-muted small">← Volver a la tienda</a>
        </div>

    </div>
</body>
</html>
