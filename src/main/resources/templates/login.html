<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Acceso Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #e9ecef; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .login-box { max-width: 400px; width: 100%; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .btn-login { background: #2b32b2; border: none; color: white; font-weight: 600; padding: 12px; transition: 0.3s; }
        .btn-login:hover { background: #1477d2; transform: translateY(-2px); }
        .logo-icon { font-size: 3rem; color: #2b32b2; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box shadow-lg">
        <div class="text-center mb-4">
            <div class="logo-icon text-primary">👤</div>
            <h3 class="fw-bold text-dark">Área Privada</h3>
            <p class="text-muted">Introduce tus credenciales para acceder</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small text-center mb-4">
            Error: Credenciales no válidas.
        </div>
        
        <form action="/loguear" method="post">
            <div class="mb-3">
                <label class="form-label small fw-bold">Correo Electrónico</label>
                <input type="email" name="email" class="form-control form-control-lg" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" name="pass" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-login shadow-sm">Iniciar Sesión</button>
                <div class="text-center mt-3">
                    <a href="/" class="text-decoration-none small text-muted">Continuar como invitado</a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
