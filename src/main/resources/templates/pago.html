<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm border-0 mb-4">
                    <h4 class="fw-bold mb-3">📍 Datos de Envío</h4>
                    <form id="formPago">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Dirección de Entrega</label>
                            <input type="text" class="form-control" placeholder="Calle, número, piso..." required>
                        </div>
                        <div class="row">
                            <div class="col"><input type="text" class="form-control" placeholder="Ciudad"></div>
                            <div class="col"><input type="text" class="form-control" placeholder="C.P."></div>
                        </div>
                        <hr class="my-4">
                        <h4 class="fw-bold mb-3">💳 Método de Pago</h4>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="m" checked> Tarjeta de Crédito</div>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="m"> PayPal</div>
                        <div class="form-check mb-4"><input class="form-check-input" type="radio" name="m"> Bizum</div>
                        
                        <button type="button" class="btn btn-success btn-lg w-100 shadow-sm" onclick="finalizarCompra()">
                            Confirmar y Pagar
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card p-4 shadow-sm border-0 bg-dark text-white text-center">
                    <h5 class="text-secondary">Resumen</h5>
                    <hr class="border-secondary">
                    <p class="mb-1" th:text="${producto.nombre}"></p>
                    <h2 class="fw-bold text-success" th:text="${producto.precio} + ' €'"></h2>
                </div>
                <div class="text-center mt-3">
                    <a href="/" class="text-muted text-decoration-none small">← Cancelar compra</a>
                </div>
            </div>
        </div>
    </div>

	<script th:src="@{/js/funciones.js}"></script>
</body>
</html>
