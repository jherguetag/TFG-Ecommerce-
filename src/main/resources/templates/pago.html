<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm border-0 mb-4">
                    <h4 class="fw-bold mb-3">📍 Datos de Envío</h4>
                    
                    <form id="formPago">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Dirección de Entrega</label>
                            <input type="text" class="form-control" placeholder="Calle, número, piso..." required>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <input type="text" class="form-control" placeholder="Ciudad" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control" placeholder="C.P." required>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        <h4 class="fw-bold mb-3">💳 Método de Pago</h4>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="m" checked> Tarjeta de Crédito</div>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="m"> PayPal</div>
                        <div class="form-check mb-4"><input class="form-check-input" type="radio" name="m"> Bizum</div>
                        
                        <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">
                            Confirmar y Pagar
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card p-4 shadow-sm border-0 bg-dark text-white text-center">
                    <h5 class="text-secondary">Resumen del Pedido</h5>
                    <hr class="border-secondary">
                    
                    <div th:each="detalle : ${carrito.detalles}" class="d-flex justify-content-between text-start mb-2 pb-2 border-bottom border-secondary">
                        <span class="small text-light text-truncate pe-2" th:text="${detalle.cantidad} + 'x ' + ${detalle.producto.nombre}"></span>
                        <span class="small text-success fw-bold" th:text="${detalle.producto.precio} + ' €'"></span>
                    </div>
                    
                    <div class="mt-4 text-end">
                        <span class="text-secondary small">Total a pagar:</span>
                        <h2 class="fw-bold text-success" th:text="${total} + ' €'"></h2>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <a href="/carrito" class="text-muted text-decoration-none small">← Volver al carrito</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Buscamos el formulario de la página
        const formulario = document.querySelector('form');
        
        
        formulario.addEventListener('submit', function(event) {
            
            // 1. Frenamos el envío automático para que dé tiempo a sacar el mensaje
            event.preventDefault();
            
            // 2. Mensaje verde de éxito
            Swal.fire({
                icon: 'success',
                title: '¡Pago completado!',
                text: 'Tu pedido está en camino. Gracias por confiar en NovaTech.',
                confirmButtonColor: '#198754',
                confirmButtonText: 'Volver a la tienda'
            }).then((result) => {
                
                if (result.isConfirmed) {
                    window.location.href = '/';
                }
            });
        });
    </script>
	
</body>
</html>
