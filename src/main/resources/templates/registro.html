<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NovaTech - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .login-container { max-width: 420px; margin: auto; margin-top: 50px; }
        .card { border-radius: 15px; border: none; }
        .input-group-text { user-select: none; }
    </style>
</head>
<body class="py-5 d-flex align-items-center" style="min-height: 100vh;">
    <div class="container login-container">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold">NOVATECH</h2>
            <p class="text-muted">Crea tu nueva cuenta</p>
        </div>

        <div class="card p-4 mb-4 shadow-sm">
            <form action="/registro" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <div class="input-group">
                        <input type="password" name="pass" id="passRegistro" class="form-control border-end-0" 
                               placeholder="••••••••" required 
                               pattern="(?=.*[A-Z])(?=.*[\W_]).{6,}" 
                               title="Mínimo 6 caracteres. Debe incluir una mayúscula y un carácter especial (@, #, !, *).">
                        <span class="input-group-text bg-white border-start-0" onclick="togglePassword('passRegistro', 'iconoRegistro')" style="cursor: pointer;">
                            <i id="iconoRegistro" class="bi bi-eye text-muted"></i>
                        </span>
                    </div>
                    <div class="form-text small mt-1" style="font-size: 0.8rem;">
                        Mínimo 6 caracteres. Debe incluir una mayúscula y un carácter especial (@, #, !, *).
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 shadow-sm fw-bold">Crear Cuenta</button>
            </form>

            <div class="text-center mt-4 border-top pt-3">
                <span class="text-muted small">¿Ya tienes una cuenta?</span>
                <a href="/login" class="text-dark text-decoration-none fw-bold small ms-1">Entrar aquí</a>
            </div>
        </div>

    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("bi-eye", "bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("bi-eye-slash", "bi-eye");
            }
        }
    </script>
</body>
</html>
