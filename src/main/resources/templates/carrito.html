<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>NovaTech - Mi Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">NOVATECH</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Volver al Catálogo</a></li>
                </ul>
                <a sec:authorize="isAuthenticated()" href="/logout" class="btn btn-outline-danger btn-sm ms-2 me-3">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 fw-bold">🛒 Mi Carrito</h2>

        <div class="card shadow-sm mb-5 p-4 border-0">
            <div th:if="${carrito == null or #lists.isEmpty(carrito.detalles)}" class="alert alert-warning text-center">
                Tu carrito está vacío. ¡Añade algunos productos!
            </div>
            
            <table th:if="${carrito != null and !#lists.isEmpty(carrito.detalles)}" class="table align-middle">
				<thead class="table-light">
				    <tr>
				        <th>Producto</th>
				        <th class="text-center">Cantidad</th>
				        <th class="text-end">Precio Ud.</th>
				        <th class="text-center">Acción</th> </tr>
				</thead>
				<tbody>
				    <tr th:each="detalle : ${carrito.detalles}">
				        <td class="fw-bold" th:text="${detalle.producto.nombre}"></td>
				        
				        <td class="text-center">
				            <form th:action="@{/carrito/update}" method="post" class="d-flex justify-content-center">
				                <input type="hidden" name="idDetalle" th:value="${detalle.id}">
				                <input type="number" name="cantidad" th:value="${detalle.cantidad}" min="1" max="10" class="form-control form-control-sm" style="width: 65px;">
				                <button type="submit" class="btn btn-sm btn-outline-primary ms-1">OK</button>
				            </form>
				        </td>
				        
				        <td class="text-end text-success fw-bold" th:text="${detalle.producto.precio} + ' €'"></td>
				        
				        <td class="text-center">
				            <a th:href="@{/carrito/eliminar/{id}(id=${detalle.id})}" class="btn btn-sm btn-outline-danger">✕</a>
				        </td>
				    </tr>
				</tbody>
            </table>
            
            <div class="text-end mt-3" th:if="${carrito != null and !#lists.isEmpty(carrito.detalles)}">
                <a href="/checkout" class="btn btn-primary btn-lg shadow">Proceder al Pago</a>
            </div>
        </div>

        <h4 class="mb-4 fw-bold text-secondary">💡 Sugerencias para ti:</h4>
        <div class="row">
            <div class="col-md-3 mb-4" th:each="sugerencia : ${sugerencias}">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="${sugerencia.imagen}" class="card-img-top p-3 bg-white" style="height: 150px; object-fit: contain;">
                    <div class="card-body text-center d-flex flex-column">
                        <h6 class="card-title text-truncate" th:text="${sugerencia.nombre}"></h6>
                        <p class="text-success fw-bold mb-2" th:text="${sugerencia.precio} + ' €'"></p>
                        
                        <form th:action="@{/carrito/add/{id}(id=${sugerencia.id})}" method="post" class="mt-auto">
                            <button type="submit" class="btn btn-sm btn-outline-success w-100">Añadir sugerencia</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
